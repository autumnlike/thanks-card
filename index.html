<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanks Card 💌</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Rock+Salt&family=Sacramento&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e8eaf6 100%);
    min-height: 100vh;
    padding: 20px;
    color: #333;
  }

  .app-title {
    text-align: center;
    font-size: 2rem;
    font-weight: 900;
    margin: 20px 0 10px;
    background: linear-gradient(135deg, #e91e63, #9c27b0, #3f51b5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .app-subtitle {
    text-align: center;
    font-size: 0.95rem;
    color: #888;
    margin-bottom: 30px;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
  }

  .section {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .section-label {
    font-size: 0.85rem;
    font-weight: 700;
    color: #9c27b0;
    margin-bottom: 10px;
    letter-spacing: 0.05em;
  }

  /* Member select */
  .member-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .member-btn {
    padding: 10px 4px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    background: #fff;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 700;
    transition: all 0.2s;
    text-align: center;
  }

  .member-btn:hover {
    border-color: #ce93d8;
    background: #fce4ec;
  }

  .member-btn.selected {
    border-color: #9c27b0;
    background: linear-gradient(135deg, #fce4ec, #f3e5f5);
    color: #7b1fa2;
    box-shadow: 0 2px 8px rgba(156,39,176,0.2);
  }

  /* Sender input */
  .sender-input {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-family: inherit;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .sender-input:focus {
    border-color: #ce93d8;
  }

  /* Theme select */
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .theme-btn {
    position: relative;
    padding: 14px 10px;
    border: 3px solid #e0e0e0;
    border-radius: 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    transition: all 0.25s;
    text-align: center;
    overflow: hidden;
  }

  .theme-btn .theme-emoji {
    font-size: 1.6rem;
    display: block;
    margin-bottom: 4px;
  }

  .theme-btn:hover { transform: translateY(-2px); }

  .theme-btn.selected {
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    transform: translateY(-2px);
  }

  /* Theme colors */
  .theme-btn[data-theme="cute"] { background: linear-gradient(135deg, #ffeef5, #fff0f5); color: #d81b60; }
  .theme-btn[data-theme="cute"].selected { border-color: #ec407a; }
  .theme-btn[data-theme="heartful"] { background: linear-gradient(135deg, #fff8e1, #fff3e0); color: #e65100; }
  .theme-btn[data-theme="heartful"].selected { border-color: #ff9800; }
  .theme-btn[data-theme="rock"] { background: linear-gradient(135deg, #263238, #37474f); color: #ffd54f; }
  .theme-btn[data-theme="rock"].selected { border-color: #ffd54f; }
  .theme-btn[data-theme="nature"] { background: linear-gradient(135deg, #e8f5e9, #f1f8e9); color: #2e7d32; }
  .theme-btn[data-theme="nature"].selected { border-color: #66bb6a; }
  .theme-btn[data-theme="cafe"] { background: linear-gradient(135deg, #efebe9, #d7ccc8); color: #4e342e; }
  .theme-btn[data-theme="cafe"].selected { border-color: #8d6e63; }
  .theme-btn[data-theme="sunset"] { background: linear-gradient(135deg, #fff3e0, #fce4ec); color: #e65100; }
  .theme-btn[data-theme="sunset"].selected { border-color: #ff7043; }
  .theme-btn[data-theme="ocean"] { background: linear-gradient(135deg, #e0f7fa, #e1f5fe); color: #0277bd; }
  .theme-btn[data-theme="ocean"].selected { border-color: #29b6f6; }
  .theme-btn[data-theme="nightsky"] { background: linear-gradient(135deg, #1a237e, #283593); color: #ffd54f; }
  .theme-btn[data-theme="nightsky"].selected { border-color: #ffd54f; }
  .theme-btn[data-theme="winter"] { background: linear-gradient(135deg, #e3f2fd, #f3f8ff); color: #1565c0; }
  .theme-btn[data-theme="winter"].selected { border-color: #64b5f6; }
  .theme-btn[data-theme="retropop"] { background: linear-gradient(135deg, #fff176, #ff8a80); color: #d50000; }
  .theme-btn[data-theme="retropop"].selected { border-color: #ff5252; }
  .theme-btn[data-theme="festival"] { background: linear-gradient(135deg, #ffe0b2, #f8bbd0); color: #c2185b; }
  .theme-btn[data-theme="festival"].selected { border-color: #e91e63; }
  .theme-btn[data-theme="rainbow"] { background: linear-gradient(135deg, #ffcdd2, #fff9c4, #c8e6c9, #bbdefb); color: #5c6bc0; }
  .theme-btn[data-theme="rainbow"].selected { border-color: #7c4dff; }
  .theme-btn[data-theme="monotone"] { background: linear-gradient(135deg, #f5f5f5, #e0e0e0); color: #212121; }
  .theme-btn[data-theme="monotone"].selected { border-color: #616161; }
  .theme-btn[data-theme="elegant"] { background: linear-gradient(135deg, #1a237e, #0d47a1); color: #ffd700; }
  .theme-btn[data-theme="elegant"].selected { border-color: #ffd700; }

  .theme-more-row { display:none; }
  .theme-more-row.open { display:contents; }

  .toggle-more-btn {
    grid-column: 1 / -1;
    background: none;
    border: 2px dashed #ccc;
    border-radius: 12px;
    padding: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 700;
    color: #999;
    transition: all 0.2s;
  }
  .toggle-more-btn:hover { border-color: #9c27b0; color: #9c27b0; }

  /* Message */
  .message-area {
    width: 100%;
    height: 100px;
    padding: 12px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-family: inherit;
    font-size: 0.95rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  .message-area:focus {
    border-color: #ce93d8;
  }

  .char-count {
    text-align: right;
    font-size: 0.75rem;
    color: #aaa;
    margin-top: 4px;
  }

  /* Preview */
  .preview-wrapper {
    text-align: center;
  }

  .preview-card {
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    max-width: 100%;
    display: none;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    justify-content: center;
  }

  .btn {
    padding: 12px 28px;
    border: none;
    border-radius: 30px;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
  }

  .btn-preview {
    background: linear-gradient(135deg, #7c4dff, #536dfe);
    color: #fff;
  }

  .btn-preview:hover {
    box-shadow: 0 4px 16px rgba(124,77,255,0.4);
    transform: translateY(-1px);
  }

  .btn-download {
    background: linear-gradient(135deg, #e91e63, #c2185b);
    color: #fff;
    display: none;
  }

  .btn-download:hover {
    box-shadow: 0 4px 16px rgba(233,30,99,0.4);
    transform: translateY(-1px);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  .error-msg {
    color: #e53935;
    font-size: 0.85rem;
    text-align: center;
    margin-top: 8px;
    min-height: 1.2em;
  }

  canvas { display: none; }

  /* Confetti animation */
  .confetti-piece {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    animation: confetti-fall 2.5s ease-out forwards;
  }

  @keyframes confetti-fall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.3); }
  }
</style>
</head>
<body>

<div class="container">
  <h1 class="app-title">Thanks Card</h1>
  <p class="app-subtitle">プロジェクト、おつかれさまでした！</p>

  <div class="section" id="howto">
    <div class="section-label" style="text-align:center;">📖 つかいかた</div>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;text-align:center;margin-top:8px;">
      <div style="background:#f3e5f5;border-radius:14px;padding:12px 6px;">
        <div style="font-size:1.5rem;">🎁</div>
        <div style="font-size:0.8rem;font-weight:700;color:#7b1fa2;margin:4px 0 2px;">① 相手を選ぶ</div>
        <div style="font-size:0.7rem;color:#888;">メンバーの名前を<br>タップ</div>
      </div>
      <div style="background:#fff3e0;border-radius:14px;padding:12px 6px;">
        <div style="font-size:1.5rem;">💬</div>
        <div style="font-size:0.8rem;font-weight:700;color:#e65100;margin:4px 0 2px;">② メッセージ</div>
        <div style="font-size:0.7rem;color:#888;">ありがとうの<br>気持ちを入力</div>
      </div>
      <div style="background:#fce4ec;border-radius:14px;padding:12px 6px;">
        <div style="font-size:1.5rem;">🎨</div>
        <div style="font-size:0.8rem;font-weight:700;color:#c2185b;margin:4px 0 2px;">③ デザイン</div>
        <div style="font-size:0.7rem;color:#888;">4種類から<br>好きなものを選択</div>
      </div>
      <div style="background:#e8f5e9;border-radius:14px;padding:12px 6px;">
        <div style="font-size:1.5rem;">📥</div>
        <div style="font-size:0.8rem;font-weight:700;color:#2e7d32;margin:4px 0 2px;">④ ダウンロード</div>
        <div style="font-size:0.7rem;color:#888;">カード画像を<br>PNGで保存</div>
      </div>
      <div style="background:#e3f2fd;border-radius:14px;padding:12px 6px;">
        <div style="font-size:1.5rem;">🚀</div>
        <div style="font-size:0.8rem;font-weight:700;color:#1565c0;margin:4px 0 2px;">⑤ 送ろう！</div>
        <div style="font-size:0.7rem;color:#888;">SlackのDMや<br>メールに貼り付け</div>
      </div>
    </div>
  </div>

  <!-- To -->
  <div class="section">
    <div class="section-label" style="display:flex;justify-content:space-between;align-items:center;">
      <span>🎁 だれに送る？</span>
      <button onclick="toggleSetup()" id="toggleSetupBtn" style="background:none;border:none;color:#9c27b0;font-size:0.8rem;cursor:pointer;font-family:inherit;font-weight:700;">メンバーを変更 ✏️</button>
    </div>
    <div id="recipientGrid" class="member-grid"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:10px;">
      <span style="font-size:0.8rem;color:#aaa;white-space:nowrap;">または直接入力:</span>
      <input type="text" class="sender-input" id="manualRecipient" placeholder="名前を入力" style="font-size:0.85rem;" oninput="onManualRecipient()">
    </div>
    <!-- Inline setup -->
    <div id="setupPanel" style="display:none;margin-top:12px;padding-top:12px;border-top:1px dashed #e0e0e0;">
      <p style="font-size:0.85rem;color:#888;margin-bottom:8px;">1行に1人ずつ名前を入力してください</p>
      <textarea class="message-area" id="membersInput" placeholder="山田太郎&#10;鈴木花子&#10;田中一郎" style="height:120px;"></textarea>
      <div class="btn-row" style="margin-top:10px;justify-content:space-between;">
        <button class="btn btn-preview" onclick="applyMembers()" style="font-size:0.85rem;padding:8px 20px;">反映する</button>
        <button class="btn" onclick="generateURL()" style="font-size:0.85rem;padding:8px 20px;background:linear-gradient(135deg,#9c27b0,#7b1fa2);color:#fff;">共有URLを生成 🔗</button>
      </div>
      <div id="urlResult" style="display:none;margin-top:10px;">
        <input type="text" class="sender-input" id="generatedURL" readonly style="font-size:0.75rem;cursor:pointer;" onclick="copyURL()">
        <p style="font-size:0.8rem;color:#4caf50;text-align:center;margin-top:4px;" id="copyMsg"></p>
        <div class="btn-row">
          <a class="btn btn-preview" id="previewLink" href="#" target="_blank" style="text-decoration:none;display:none;font-size:0.85rem;padding:8px 20px;">画面を確認する →</a>
        </div>
      </div>
      <div class="error-msg" id="setupError"></div>
    </div>
  </div>

    <!-- From -->
    <div class="section">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="section-label" style="margin-bottom:0;white-space:nowrap;">✍️ あなたの名前</div>
        <input type="text" class="sender-input" id="senderName" placeholder="名前を入力" style="flex:1;">
      </div>
    </div>

    <!-- Theme -->
    <div class="section">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="section-label" style="margin-bottom:0;white-space:nowrap;">🎨 デザイン</div>
        <div class="theme-grid" id="themeGrid" style="flex:1;">
          <button class="theme-btn selected" data-theme="cute" onclick="selectTheme('cute', this)"><span class="theme-emoji">🌸</span>かわいい</button>
          <button class="theme-btn" data-theme="heartful" onclick="selectTheme('heartful', this)"><span class="theme-emoji">🧡</span>ハートフル</button>
          <button class="theme-btn" data-theme="rock" onclick="selectTheme('rock', this)"><span class="theme-emoji">🎸</span>ロック</button>
          <button class="theme-btn" data-theme="nature" onclick="selectTheme('nature', this)"><span class="theme-emoji">🌿</span>ナチュラル</button>
          <button class="toggle-more-btn" id="toggleMoreBtn" onclick="toggleMoreThemes()">もっと見る ▼</button>
          <div class="theme-more-row" id="moreThemes">
            <button class="theme-btn" data-theme="cafe" onclick="selectTheme('cafe', this)"><span class="theme-emoji">☕</span>カフェ</button>
            <button class="theme-btn" data-theme="sunset" onclick="selectTheme('sunset', this)"><span class="theme-emoji">🌅</span>サンセット</button>
            <button class="theme-btn" data-theme="ocean" onclick="selectTheme('ocean', this)"><span class="theme-emoji">🌊</span>オーシャン</button>
            <button class="theme-btn" data-theme="nightsky" onclick="selectTheme('nightsky', this)"><span class="theme-emoji">🌙</span>ナイトスカイ</button>
            <button class="theme-btn" data-theme="winter" onclick="selectTheme('winter', this)"><span class="theme-emoji">❄️</span>ウィンター</button>
            <button class="theme-btn" data-theme="retropop" onclick="selectTheme('retropop', this)"><span class="theme-emoji">🍭</span>レトロポップ</button>
            <button class="theme-btn" data-theme="festival" onclick="selectTheme('festival', this)"><span class="theme-emoji">🎪</span>フェスティバル</button>
            <button class="theme-btn" data-theme="rainbow" onclick="selectTheme('rainbow', this)"><span class="theme-emoji">🌈</span>レインボー</button>
            <button class="theme-btn" data-theme="monotone" onclick="selectTheme('monotone', this)"><span class="theme-emoji">🖤</span>モノトーン</button>
            <button class="theme-btn" data-theme="elegant" onclick="selectTheme('elegant', this)"><span class="theme-emoji">🎩</span>エレガント</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Message -->
    <div class="section">
      <div class="section-label">💬 メッセージ</div>
      <textarea class="message-area" id="messageText" placeholder="ありがとうの気持ちを書こう！" maxlength="200"></textarea>
      <div class="char-count"><span id="charCount">0</span> / 200</div>
    </div>

    <!-- Preview & Download -->
    <div class="section preview-wrapper">
      <div class="section-label">📸 プレビュー</div>
      <img class="preview-card" id="previewImg" alt="カードプレビュー">
      <div class="btn-row">
        <button class="btn btn-preview" id="btnPreview" onclick="generateCard()">プレビュー</button>
        <button class="btn btn-download" id="btnDownload" onclick="downloadCard()">ダウンロード 📥</button>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>
</div>

<canvas id="cardCanvas" width="800" height="500"></canvas>

<script>
// メンバーをクエリストリングから取得: ?members=名前1,名前2,名前3
const params = new URLSearchParams(window.location.search);
const SAMPLE_MEMBERS = ['山田太郎', '鈴木花子', '田中一郎'];
const membersParam = params.get('members');
let MEMBERS = membersParam
  ? membersParam.split(',').map(s => s.trim()).filter(Boolean)
  : SAMPLE_MEMBERS;

let selectedRecipient = '';
let selectedTheme = 'cute';

function buildMemberButtons() {
  const grid = document.getElementById('recipientGrid');
  grid.innerHTML = '';
  MEMBERS.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'member-btn';
    btn.textContent = name;
    btn.onclick = () => {
      document.querySelectorAll('.member-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedRecipient = name;
      document.getElementById('manualRecipient').value = '';
    };
    grid.appendChild(btn);
  });
}
buildMemberButtons();

function onManualRecipient() {
  const val = document.getElementById('manualRecipient').value.trim();
  document.querySelectorAll('.member-btn').forEach(b => b.classList.remove('selected'));
  selectedRecipient = val;
}

function toggleSetup() {
  const panel = document.getElementById('setupPanel');
  const isHidden = panel.style.display === 'none';
  panel.style.display = isHidden ? 'block' : 'none';
  if (isHidden) {
    document.getElementById('membersInput').value = MEMBERS.join('\n');
  }
}

function applyMembers() {
  const input = document.getElementById('membersInput').value.trim();
  if (!input) return;
  const names = input.split('\n').map(s => s.trim()).filter(Boolean);
  if (names.length === 0) return;
  MEMBERS = names;
  selectedRecipient = '';
  buildMemberButtons();
  document.getElementById('setupPanel').style.display = 'none';
}

function generateURL() {
  const input = document.getElementById('membersInput').value.trim();
  const errorEl = document.getElementById('setupError');
  if (!input) { errorEl.textContent = 'メンバーを入力してください'; return; }
  const names = input.split('\n').map(s => s.trim()).filter(Boolean);
  if (names.length < 2) { errorEl.textContent = '2人以上入力してください'; return; }
  errorEl.textContent = '';
  const base = window.location.origin + window.location.pathname;
  const url = base + '?members=' + encodeURIComponent(names.join(','));
  document.getElementById('generatedURL').value = url;
  document.getElementById('urlResult').style.display = 'block';
  const previewLink = document.getElementById('previewLink');
  previewLink.href = url;
  previewLink.style.display = 'inline-block';
  copyURL();
}

function copyURL() {
  const urlInput = document.getElementById('generatedURL');
  navigator.clipboard.writeText(urlInput.value).then(() => {
    document.getElementById('copyMsg').textContent = 'コピーしました！このURLをメンバーに共有してください';
    setTimeout(() => { document.getElementById('copyMsg').textContent = ''; }, 3000);
  });
}

function selectTheme(theme, el) {
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedTheme = theme;
}

function toggleMoreThemes() {
  const more = document.getElementById('moreThemes');
  const btn = document.getElementById('toggleMoreBtn');
  const isOpen = more.classList.contains('open');
  more.classList.toggle('open');
  btn.textContent = isOpen ? 'もっと見る ▼' : '閉じる ▲';
}

document.getElementById('messageText').addEventListener('input', function() {
  document.getElementById('charCount').textContent = this.value.length;
});

// Theme configs
const THEMES = {
  cute: {
    bg: ['#fce4ec', '#f8bbd0', '#f48fb1'],
    accent: '#e91e63',
    textColor: '#880e4f',
    subColor: '#ad1457',
    titleFont: '900 36px "Zen Maru Gothic"',
    bodyFont: '400 18px "Zen Maru Gothic"',
    fromFont: '700 16px "Zen Maru Gothic"',
    decoEmoji: ['🌸', '✨', '💖', '🎀', '🩷', '⭐'],
    label: 'Thank You!',
    pattern: 'hearts'
  },
  heartful: {
    bg: ['#fff8e1', '#ffecb3', '#ffe082'],
    accent: '#ff6f00',
    textColor: '#4e342e',
    subColor: '#6d4c41',
    titleFont: '900 36px "Zen Maru Gothic"',
    bodyFont: '400 18px "Zen Maru Gothic"',
    fromFont: '700 16px "Zen Maru Gothic"',
    decoEmoji: ['☀️', '🧡', '🌻', '🕊️', '🫶', '🌟'],
    label: 'Heartfelt Thanks',
    pattern: 'dots'
  },
  rock: {
    bg: ['#1a1a2e', '#16213e', '#0f3460'],
    accent: '#ffd54f',
    textColor: '#fafafa',
    subColor: '#bdbdbd',
    titleFont: '900 38px "Zen Maru Gothic"',
    bodyFont: '400 18px "Zen Maru Gothic"',

function drawRoundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawPattern(ctx, theme, w, h) {
  ctx.globalAlpha = 0.08;
  const t = THEMES[theme];

  if (t.pattern === 'hearts') {
    for (let i = 0; i < 20; i++) {
      const x = Math.random() * w;
      const y = Math.random() * h;
      const s = 8 + Math.random() * 14;
      ctx.font = `${s}px serif`;
      ctx.fillText('♥', x, y);
    }
  } else if (t.pattern === 'dots') {
    for (let i = 0; i < 40; i++) {
      const x = Math.random() * w;
      const y = Math.random() * h;
      ctx.beginPath();
      ctx.arc(x, y, 3 + Math.random() * 5, 0, Math.PI * 2);
      ctx.fillStyle = t.accent;
      ctx.fill();
    }
  } else if (t.pattern === 'zigzag') {
    ctx.strokeStyle = t.accent;
    ctx.lineWidth = 2;
    for (let row = 0; row < 8; row++) {
      ctx.beginPath();
      const yy = row * 70 + 20;
      for (let x = 0; x < w; x += 20) {
        ctx.lineTo(x, yy + (x % 40 === 0 ? -8 : 8));
      }
      ctx.stroke();
    }
  } else if (t.pattern === 'leaves') {
    for (let i = 0; i < 25; i++) {
      const x = Math.random() * w;
      const y = Math.random() * h;
      ctx.font = `${10 + Math.random() * 16}px serif`;
      ctx.fillText('🍃', x, y);
    }
  } else if (t.pattern === 'waves') {
    ctx.strokeStyle = t.accent;
    ctx.lineWidth = 2;
    for (let row = 0; row < 6; row++) {
      ctx.beginPath();
      const yy = row * 90 + 40;
      for (let x = 0; x <= w; x += 2) {
        ctx.lineTo(x, yy + Math.sin(x * 0.03 + row) * 15);
      }
      ctx.stroke();
    }
  } else if (t.pattern === 'stars') {
    for (let i = 0; i < 30; i++) {
      const x = Math.random() * w;
      const y = Math.random() * h;
      const s = 2 + Math.random() * 4;
      ctx.beginPath();
      ctx.arc(x, y, s, 0, Math.PI * 2);
      ctx.fillStyle = t.accent;
      ctx.fill();
    }
  } else if (t.pattern === 'snowflakes') {
    for (let i = 0; i < 20; i++) {
      const x = Math.random() * w;
      const y = Math.random() * h;
      ctx.font = `${12 + Math.random() * 18}px serif`;
      ctx.fillText('❄', x, y);
    }
  } else if (t.pattern === 'confetti') {
    const colors = [t.accent, '#ffd54f', '#4caf50', '#2196f3', '#ff9800'];
    for (let i = 0; i < 50; i++) {
      const x = Math.random() * w;
      const y = Math.random() * h;
      ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(Math.random() * Math.PI);
      ctx.fillRect(-4, -2, 8, 4);
      ctx.restore();
    }
  }
  ctx.globalAlpha = 1;
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const lines = text.split('\n');
  let currentY = y;
  const allLines = [];

  lines.forEach(line => {
    if (line === '') {
      allLines.push('');
      return;
    }
    let current = '';
    for (let i = 0; i < line.length; i++) {
      const test = current + line[i];
      const metrics = ctx.measureText(test);
      if (metrics.width > maxWidth && current) {
        allLines.push(current);
        current = line[i];
      } else {
        current = test;
      }
    }
    if (current) allLines.push(current);
  });

  // Center vertically
  const totalHeight = allLines.length * lineHeight;
  const startY = y - totalHeight / 2 + lineHeight / 2;

  allLines.forEach((line, i) => {
    ctx.fillText(line, x, startY + i * lineHeight);
  });
}

function generateCard() {
  const sender = document.getElementById('senderName').value.trim();
  const message = document.getElementById('messageText').value.trim();
  const errorEl = document.getElementById('errorMsg');

  if (!selectedRecipient) { errorEl.textContent = '送り先を選んでください'; return; }
  if (!sender) { errorEl.textContent = '名前を入力してください'; return; }
  if (!message) { errorEl.textContent = 'メッセージを書いてください'; return; }
  errorEl.textContent = '';

  const canvas = document.getElementById('cardCanvas');
  const ctx = canvas.getContext('2d');
  const W = 800, H = 500;
  const t = THEMES[selectedTheme];

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, t.bg[0]);
  grad.addColorStop(0.5, t.bg[1]);
  grad.addColorStop(1, t.bg[2]);
  ctx.fillStyle = grad;
  drawRoundRect(ctx, 0, 0, W, H, 24);
  ctx.fill();

  // Pattern
  drawPattern(ctx, selectedTheme, W, H);

  // Border
  ctx.strokeStyle = t.accent;
  ctx.lineWidth = 4;
  drawRoundRect(ctx, 12, 12, W - 24, H - 24, 16);
  ctx.stroke();

  // Decorative dashed inner border
  ctx.setLineDash([6, 6]);
  ctx.strokeStyle = t.accent;
  ctx.globalAlpha = 0.3;
  ctx.lineWidth = 1.5;
  drawRoundRect(ctx, 22, 22, W - 44, H - 44, 12);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;

  // Corner emojis
  const emojis = t.decoEmoji;
  ctx.font = '28px serif';
  ctx.fillText(emojis[0], 30, 48);
  ctx.fillText(emojis[1], W - 58, 48);
  ctx.fillText(emojis[2], 30, H - 24);
  ctx.fillText(emojis[3], W - 58, H - 24);

  // Title
  ctx.font = t.titleFont;
  ctx.fillStyle = t.accent;
  ctx.textAlign = 'center';
  ctx.fillText(t.label, W / 2, 70);

  // To
  ctx.font = '700 22px "Zen Maru Gothic"';
  ctx.fillStyle = t.textColor;
  ctx.fillText(`To: ${selectedRecipient} さん`, W / 2, 115);

  // Decorative line
  ctx.beginPath();
  ctx.moveTo(200, 132);
  ctx.lineTo(600, 132);
  ctx.strokeStyle = t.accent;
  ctx.globalAlpha = 0.4;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Message — adaptive font size based on length
  const len = message.length;
  let fontSize;
  if (len <= 30) fontSize = 28;
  else if (len <= 60) fontSize = 24;
  else if (len <= 100) fontSize = 20;
  else if (len <= 150) fontSize = 17;
  else fontSize = 15;
  const lineHeight = Math.round(fontSize * 1.7);
  ctx.font = `400 ${fontSize}px "Zen Maru Gothic"`;
  ctx.fillStyle = t.textColor;
  ctx.textAlign = 'center';

  // Message area: y=145 to y=400 (center = 272)
  const msgCenterY = 272;
  wrapText(ctx, message, W / 2, msgCenterY, 620, lineHeight);

  // Decorative line before from
  ctx.beginPath();
  ctx.moveTo(250, 410);
  ctx.lineTo(550, 410);
  ctx.strokeStyle = t.accent;
  ctx.globalAlpha = 0.3;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.globalAlpha = 1;

  // From
  ctx.font = t.fromFont;
  ctx.fillStyle = t.subColor;
  ctx.textAlign = 'center';
  ctx.fillText(`From: ${sender}`, W / 2, 445);

  // Scatter small emojis
  ctx.font = '16px serif';
  ctx.globalAlpha = 0.5;
  const scatterEmojis = [emojis[4], emojis[5], emojis[0], emojis[2]];
  const positions = [
    [70, 200], [W - 90, 180], [90, 380], [W - 80, 360],
    [150, 90], [W - 170, 430]
  ];
  positions.forEach((pos, i) => {
    ctx.fillText(scatterEmojis[i % scatterEmojis.length], pos[0], pos[1]);
  });
  ctx.globalAlpha = 1;

  // Show preview
  const img = document.getElementById('previewImg');
  img.src = canvas.toDataURL('image/png');
  img.style.display = 'block';
  document.getElementById('btnDownload').style.display = 'inline-block';

  // Confetti!
  launchConfetti();
}

function downloadCard() {
  const canvas = document.getElementById('cardCanvas');
  const link = document.createElement('a');
  const sender = document.getElementById('senderName').value.trim();
  link.download = `${sender}から${selectedRecipient}へ.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function launchConfetti() {
  const colors = ['#e91e63', '#9c27b0', '#3f51b5', '#ffd54f', '#4caf50', '#ff9800'];
  const shapes = ['●', '■', '▲', '♥', '★'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-20px';
    el.style.fontSize = (10 + Math.random() * 16) + 'px';
    el.style.color = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDelay = Math.random() * 0.8 + 's';
    el.style.animationDuration = (2 + Math.random() * 1.5) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}
